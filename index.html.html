<style>

    --dark:     #111111;
    --card:     #161616;
    --border:   #252525;

    --off:      #CCCCCC;
    --muted:    #666666;
    --gold:     #C8A96E;
    --gold-dim: #8C7040;

    --c03: #7030A0;
    --c04: #00B0F0;
    --c05: #E91E8C;
    --c06: #70AD47;
    --c07: #E9C46A;
    --c08: #E74C3C;
    --c09: #F4A261;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────── */
  .header {
    position: relative;
    padding: 80px 60px 60px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .header-bg-num {
    position: absolute;
    right: -20px;
    top: -40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 340px;
    color: var(--gold);
    opacity: 0.06;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 9vw, 120px);
    line-height: 0.9;
    letter-spacing: 3px;
    color: var(--white);
  }
  .header-title span {
    color: var(--gold);
    display: block;
  }
  .header-desc {
    margin-top: 28px;
    max-width: 560px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.9;
    font-weight: 300;
  }
  .header-meta {
    margin-top: 32px;
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .meta-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
  }
  .meta-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .meta-div {
    width: 1px;
    height: 40px;
    background: var(--border);
  }
  .dstrict-badge {
    margin-top: 0;
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* ── GRID ───────────────────────────────── */
  .grid-wrap {
    padding: 60px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  /* ── CARD ───────────────────────────────── */
  .card {
    background: var(--card);
    position: relative;
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease;
    cursor: default;
  }
  .card:hover {
    transform: translateY(-4px);
    z-index: 10;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: var(--accent);
  }
  .card::after {
    content: attr(data-num);
    position: absolute;
    right: -12px; bottom: -20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    color: var(--accent);
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .card-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 2.5px;
    padding: 4px 10px;
    color: var(--black);
    background: var(--accent);
    font-weight: 700;
    margin-bottom: 16px;
    width: fit-content;
  }
  .card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    line-height: 1;
    letter-spacing: 1.5px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 11px;
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .card-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-bottom: 20px;
  }

  /* 섹션 라벨 */
  .card-section-label {
    font-family: 'Space Mono', monospace;
    font-size: 7.5px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* TECH 태그들 */
  .tech-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 18px;
  }
  .tech-tag {
    font-size: 9px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--off);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }

  /* DESC */
  .card-desc {
    font-size: 11px;
    color: #AAAAAA;
    line-height: 1.85;
    font-weight: 300;
    margin-bottom: 18px;
    flex: 1;
  }

  /* ASSET 블록 */
  .asset-block {
    padding: 10px 14px;
    margin-bottom: 16px;
    border-left: 2.5px solid var(--accent);
    background: rgba(255,255,255,0.03);
  }
  .asset-block .card-section-label {
    margin-bottom: 5px;
  }
  .asset-text {
    font-size: 10.5px;
    color: var(--white);
    font-weight: 500;
    line-height: 1.5;
  }

  /* REVENUE */
  .revenue-list {
    list-style: none;
    margin-bottom: 20px;
  }
  .revenue-list li {
    font-size: 10px;
    color: var(--off);
    padding: 3px 0;
    padding-left: 14px;
    position: relative;
    font-weight: 300;
    line-height: 1.5;
  }
  .revenue-list li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 12px;
    top: 2px;
  }

  /* 시즌 배지 */
  .season-badges {
    display: flex;
    gap: 6px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    padding: 4px 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .badge-on {
    background: var(--accent);
    color: var(--black);
  }
  .badge-off {
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
  }
  .badge-inactive {
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
  }

  /* ── FOOTER ─────────────────────────────── */
  .footer {
    padding: 40px 60px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-left {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .footer-right {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold-dim);
    letter-spacing: 3px;
  }

  /* ── HOVER GLOW ─────────────────────────── */
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 40px -10px var(--accent), 0 20px 40px -20px rgba(0,0,0,0.8);
  }

  /* ── ANIMATIONS ─────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card {
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.40s; }
  .card:nth-child(9) { animation-delay: 0.45s; }

  @media (max-width: 1200px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .grid-wrap { padding: 40px; }
    .header { padding: 60px 40px 50px; }
    .footer { padding: 30px 40px; }
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .grid-wrap { padding: 24px; }
    .header { padding: 48px 24px 40px; }
    .footer { padding: 24px; flex-direction: column; gap: 12px; }
    .header-meta { flex-wrap: wrap; }
    .dstrict-badge { margin-left: 0; }
  }
</style>
</head>

    revenue: ["낮 체험 + 야간 쇼 분리 판매", "시즌 굿즈", "F&B·쇼핑몰 연계 소비"],
    season: false, off: true,
  },
];

const grid = document.getElementById('grid');

shows.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-num', s.num);
  card.style.setProperty('--accent', s.color);

  const techTags = s.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');
  const revItems = s.revenue.map(r => `<li>${r}</li>`).join('');

  card.innerHTML = `
    <span class="card-tag">${s.tag}</span>
    <div class="card-num">SPECTACLE ${s.num}</div>
    <div class="card-name">${s.name}</div>
    <div class="card-sub">${s.sub}</div>
    <div class="card-divider"></div>

    <div class="card-section-label">TECHNOLOGY</div>
    <div class="tech-list">${techTags}</div>

    <div class="card-section-label">EXPERIENCE</div>
    <p class="card-desc">${s.desc}</p>

    <div class="asset-block">
      <div class="card-section-label">d'STRICT ASSET</div>
      <div class="asset-text">${s.asset}</div>
    </div>

    <div class="card-section-label">REVENUE MODEL</div>
    <ul class="revenue-list">${revItems}</ul>

    <div class="season-badges">
      <span class="badge ${s.season ? 'badge-on' : 'badge-inactive'}">시즌 운영</span>
      <span class="badge ${s.off ? 'badge-off' : 'badge-inactive'}">비시즌 운영</span>
    </div>
  `;

  grid.appendChild(card);
});
</script>
</body>
</html>
